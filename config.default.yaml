# SmartShell Default Configuration
# Copy to config.yaml and edit to customize.
#
# LLM provider settings (URL, model, API keys) are managed via the in-app
# settings panel (⚙) and stored separately in your OS user-data directory.
# They are never stored here.

terminal:
  # Shell to launch - leave empty to use $SHELL env var
  shell: ""
  # xterm.js font size (px)
  fontSize: 14
  # xterm.js font family
  fontFamily: "Cascadia Code, Fira Code, Consolas, monospace"

context:
  # Number of (command, output) pairs to keep for LLM context
  maxEntries: 10
  # Max characters of output stored per command (prevents huge outputs)
  maxOutputChars: 2000

assistant:
  # Assistant behavior mode:
  # "prompted"  = responds only when you send chat input
  # "automatic" = automatically comments on completed terminal commands
  # "autorun"   = reserved (not implemented yet)
  mode: "prompted"

commandPolicy:
  # Command run safety profile for command cards:
  # "strict"     = only high-confidence, low-risk commands are directly runnable
  # "balanced"   = default; read-only runs directly, state-changing asks for confirmation
  # "permissive" = allows more commands with confirmation prompts
  runMode: "balanced"

  # Optional allowlist patterns (one per line). If a command starts with one of these,
  # it is treated as trusted for confidence/risk gating.
  allowlist: []

  # Optional blocklist patterns (one per line). If a command contains one of these,
  # direct running is blocked from the UI.
  blocklist: []

# System prompt sent to the AI assistant on every request.
# Edit this to change the assistant's behavior, persona, or focus.
# The terminal context (recent commands + output) is always appended automatically.
# You can also edit this from the Settings panel (⚙) — changes there are written back here.
systemPrompt: |
  You are an intelligent terminal assistant embedded in SmartShell, a split-pane terminal + AI application.
  You have visibility into the user's recent terminal session and can help them interpret command output,
  diagnose errors, suggest next commands, and explain what's happening in their shell.

  Guidelines:
  - Format shell commands in a fenced code block (```bash) or inline backtick; do not backtick filenames, paths, or output values
  - If the terminal output shows an error, diagnose it directly and suggest a fix
  - Keep responses concise — the user is in an active terminal workflow
  - You may reference specific lines or values from the terminal output
